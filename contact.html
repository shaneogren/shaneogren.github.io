<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shane Ogren — Contact</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <a href="index.html" class="site-title">Shane Ogren</a>
    <nav>
      <a href="index.html">Painting</a>
      <a href="paper.html">Paper</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <div class="page-content">
    <h1>Contact</h1>

    <!--
      Formspree (free tier) handles the form submission — no server required.
      Steps to activate:
        1. Sign up at https://formspree.io
        2. Create a new form, copy your endpoint URL
        3. Replace "YOUR_FORM_ID" in the action attribute below with your endpoint
           e.g. action="https://formspree.io/f/abcdefgh"
    -->
    <form
      class="contact-form"
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
      id="contact-form"
    >
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send</button>

      <p class="form-success" id="form-success">Thank you — message sent.</p>
    </form>
  </div>

  <script>
    // Show inline success message instead of redirecting to Formspree's default page
    const form = document.getElementById("contact-form");
    const success = document.getElementById("form-success");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { Accept: "application/json" },
      });
      if (res.ok) {
        form.reset();
        success.style.display = "block";
      } else {
        alert("Something went wrong — please try again or send an email directly.");
      }
    });
  </script>

</body>
</html>
